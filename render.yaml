services:
  - type: web
    name: teacher-bot
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_GEMINI_API_KEY
        sync: false   # Set this manually in the Render dashboard
